name: Build credentials indexes

on:
  push:
    branches:
      - main
    paths:
      - 'credentials/*/*/credential.yaml'
      - 'issued/users/**/*/credential.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build credentials indexes
        env:
          SKILLCRAFT_PAGES_BASE_URL: https://skillcraft.gg
        run: node .github/scripts/build-credentials-index.mjs

      - name: Commit updated indexes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add credentials/index.json issued/users/index.json
          if git diff --cached --quiet; then
            echo "No index changes."
            exit 0
          fi
          git commit -m "chore: refresh credential indexes"
          git push
